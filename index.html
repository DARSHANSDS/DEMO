<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Actions Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        h1 {
            font-size: 50px;
        }

        p {
            font-size: 20px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>🚀 GitHub Actions</h1>
    <p>This page is deployed automatically using GitHub Actions.</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="msg"></p>
</div>

<script>
function showMessage() {
    document.getElementById("msg").innerHTML = "✅ GitHub Actions deployment works!";
}
</script>

</body>
</html>
